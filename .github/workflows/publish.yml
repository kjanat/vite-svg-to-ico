# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Publish to npm
run-name: Publish ${{ github.ref_name || 'manual' }}
on: { push: { tags: ["v[0-9]+.[0-9]+.[0-9]+*"] }, workflow_dispatch }
permissions: { contents: read, id-token: write }
jobs:
  publish:
    runs-on: ubuntu-latest
    env: { NPM_CONFIG_PROVENANCE: "${{ vars.PROVENANCE || 'true' }}" }
    environment: { name: npm, url: "${{ steps.publish.outputs.npm_url }}" }
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v7
        with: { node-version-file: .node-version, registry-url: https://registry.npmjs.org }
      - run: bun install --frozen-lockfile

      # Stamp release version from git tag
      - if: startsWith(github.ref, 'refs/tags/v')
        run: bun pm version from-git --allow-same-version --no-git-tag-version

      - id: publish
        uses: actions/github-script@v9
        with:
          script: |
            const { readFile } = await import('node:fs/promises')
            const pkg = JSON.parse(await readFile('package.json', 'utf8'))
            core.setOutput('npm_url', `https://npm.im/package/${pkg["name"]}/v/${pkg["version"]}`)

            const npmTag = pkg["version"].includes('-') ? 'next' : 'latest'
            const tarball = (await exec.getExecOutput('bun', ['run', '--silent', 'tar'])).stdout.trim()

            // bun publish lacks --provenance; use npm for signed provenance
            await exec.exec('bunx', ['npm@11', 'publish', '--access', 'public', '--tag', npmTag, tarball])
